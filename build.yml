kind: BuildConfig
apiVersion: build.openshift.io/v1
metadata:
  name: greeting-console
spec:
  nodeSelector: {}
  strategy:
    type: Docker
  source:
    type: Git
    git:
      uri: 'https://github.com/RafaelSausen/do400-greeting-console'
      ref: main
  output:
    to:
      kind: DockerImage
      name: "quay.io/rsb13188/greeting-console:latest"
    pushSecret:
      name: quay-credentials
